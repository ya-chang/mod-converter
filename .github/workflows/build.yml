name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --name mod-converter --console main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-converter-windows
          path: dist/mod-converter.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name mod-converter --console main.py

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-converter-linux
          path: dist/mod-converter
